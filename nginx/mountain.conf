server {
    listen 80;
    server_name _;

    root /var/www/mountain/frontend/app/dist;
    index index.html;

    # Security headers — X-Frame-Options intentionally omitted to allow Bitrix24 iframe
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "frame-ancestors *" always;

    # Block common exploit probes
    location ~* \.(env|git|sql|bak|sh|py|rb|pl)$ {
        return 404;
    }

    # Bitrix24 webhooks + dashboard API → Node.js sync service
    location /webhook/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_send_timeout   10s;
        proxy_read_timeout   10s;
    }

    # API → FastAPI backend
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        # Timeouts — Bitrix API calls can take 30-90s
        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;
        proxy_read_timeout    180s;

        # Buffer settings for large JSON responses
        proxy_buffering       on;
        proxy_buffer_size     16k;
        proxy_buffers         8 16k;
        proxy_busy_buffers_size 32k;
    }

    # Static assets — long cache (Vite hashes filenames, safe to cache forever)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html — no cache (deploy dan keyin yangi chunk URL larini olishi uchun)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
        try_files $uri /index.html;
    }

    # SPA fallback
    location / {
        try_files $uri /index.html;
    }
}
